<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2230"/>
      <stop offset="1" stop-color="#0f1115"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#2ad874"/>
      <stop offset="0.5" stop-color="#20c463"/>
      <stop offset="1" stop-color="#149a4b"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- loop arrow ring -->
  <g fill="none" stroke="#20c463" stroke-width="26" stroke-linecap="round">
    <path d="M 256 120
             A 136 136 0 1 1 138 188" />
  </g>
  <!-- arrowhead -->
